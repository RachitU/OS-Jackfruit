name: CI Smoke Check

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-smoke:
    name: User-space build + smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential

      # Kernel headers are NOT installed in the CI runner, so we only
      # run the `ci` target which skips the kernel module build.
      - name: Build user-space binaries (CI-safe)
        run: make -C boilerplate ci

      # The smoke test is already embedded in the `ci` make target:
      # ./engine with no arguments must print usage and exit non-zero.
      # The step above already runs it; this step makes it explicit.
      - name: Verify engine smoke test
        run: |
          cd boilerplate
          # engine must exit non-zero when called with no args
          ./engine 2>/dev/null; STATUS=$?
          if [ "$STATUS" -eq 0 ]; then
            echo "FAIL: engine exited 0 with no arguments (expected non-zero)"
            exit 1
          fi
          echo "PASS: engine exited $STATUS (non-zero) with no arguments"

      - name: Verify all user-space binaries were produced
        run: |
          for bin in engine memory_hog cpu_hog io_pulse; do
            if [ ! -x "boilerplate/$bin" ]; then
              echo "FAIL: $bin not found or not executable"
              exit 1
            fi
            echo "PASS: $bin present"
          done
